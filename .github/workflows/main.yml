name: Build APK with Portuguese Translation
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
      - name: Create Portuguese strings.xml
        run: |
          mkdir -p core/resources/src/main/res/values-pt
          cat > core/resources/src/main/res/values-pt/strings.xml << 'EOF'
