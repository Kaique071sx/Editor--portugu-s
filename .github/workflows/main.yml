name: Build APK with Portuguese Translation
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout original repository
        uses: actions/checkout@v4
        with:
          repository: Visual-Code-Space/Visual-Code-Space

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create Portuguese strings.xml
        run: |
          mkdir -p core/resources/src/main/res/values-pt
          cat > core/resources/src/main/res/values-pt/strings.xml << 'EOF'
          <resources xmlns:tools="http://schemas.android.com/tools" tools:ignore="MissingTranslation">
          <!-- [CONTEÚDO PORTUGUÊS COMPLETO AQUI - 343 STRINGS] -->
          </resources>
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/*.apk
          tag_name: v1.0.0-portuguese
          release_name: Visual Code Space - Edição Portuguesa
          body: |
            # 🇧🇷 Visual Code Space - Edição em Português
            APK compilado com interface 100% em português (Brasil)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
